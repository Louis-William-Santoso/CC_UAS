# ========================
# UPSTREAM LOAD BALANCING
# ========================
upstream backend {
    # least_conn;
    # GANTI IP ini sesuai IP LAN Laptop B dan C
    server 192.168.1.9:8000 max_fails=3 fail_timeout=30s;
    server 192.168.1.9:8080 max_fails=3 fail_timeout=30s;
}

# ========================
# CACHE ZONES (CDN)
# ========================
proxy_cache_path /data/cache/html levels=1:2
                 keys_zone=html_cache:10m max_size=500m
                 inactive=60m use_temp_path=off;

proxy_cache_path /data/cache/static levels=1:2
                 keys_zone=static_cache:50m max_size=2g
                 inactive=7d use_temp_path=off;

proxy_cache_key "$scheme$request_method$host$request_uri";

# ========================
# ROUTING: konten -> cache zone
# ========================
map $request_uri $cdn_cache_zone {
    default                                   "html_cache";
    ~*\.(css|js|jpg|jpeg|png|gif|ico|svg|woff2|ttf|eot|pdf|zip|mp4|webm|webp)$ "static_cache";
}
