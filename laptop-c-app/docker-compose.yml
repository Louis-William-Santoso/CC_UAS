services:
  app:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./html:/usr/share/nginx/html

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    ports:
      - '9300:9100'
